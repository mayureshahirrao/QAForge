# behave.ini — central Behave configuration
[behave]
default_format = pretty
show_skipped = false
show_timings = true
junit = true
junit_directory = reports/junit
logging_level = INFO
logging_format = %(asctime)s [%(levelname)-7s] %(name)s: %(message)s
stderr_capture = false
stdout_capture = false
log_capture = false

# Allure formatter
[behave.formatters]
allure = allure_behave.formatter:AllureFormatter

# Default tags excluded unless overridden via CLI: -t @smoke etc.
[behave.userdata]
env = dev
browser = chromium
headless = true
parallel_workers = 4
retry_failed = 1
